apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-frontend
  labels:
    {{- include "osint.labels" . | nindent 4 }}
    {{- include "osint.frontend.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "osint.frontend.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
  type: {{ .Values.frontend.service.type }}
