{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-redis
  labels:
    {{- include "osint.labels" . | nindent 4 }}
    {{- include "osint.redis.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "osint.redis.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: 6379
  type: ClusterIP
{{- end }}
