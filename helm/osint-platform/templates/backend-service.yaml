apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-backend
  labels:
    {{- include "osint.labels" . | nindent 4 }}
    {{- include "osint.backend.selectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "osint.backend.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: 8000
  type: {{ .Values.backend.service.type }}
