services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-osint_platform}
      POSTGRES_USER: ${DB_USER:-osint_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    environment:
      DJANGO_SETTINGS_MODULE: osint_platform.settings.production
      SECRET_KEY: ${SECRET_KEY}
      ALLOWED_HOST: ${ALLOWED_HOST:-localhost}
      FRONTEND_HOST: ${FRONTEND_HOST:-localhost}
      DB_NAME: ${DB_NAME:-osint_platform}
      DB_USER: ${DB_USER:-osint_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SHODAN_API_KEY: ${SHODAN_API_KEY}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY}
      CENSYS_API_ID: ${CENSYS_API_ID}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET}
      HIBP_API_KEY: ${HIBP_API_KEY}
      DEHASHED_EMAIL: ${DEHASHED_EMAIL}
      DEHASHED_API_KEY: ${DEHASHED_API_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      SECURE_SSL_REDIRECT: ${SECURE_SSL_REDIRECT:-False}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    command: sh -c "python manage.py migrate && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  tools_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.tools-worker
    environment:
      DJANGO_SETTINGS_MODULE: osint_platform.settings.production
      SECRET_KEY: ${SECRET_KEY}
      DB_NAME: ${DB_NAME:-osint_platform}
      DB_USER: ${DB_USER:-osint_user}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      OSINT_TOOLS_DIR: /tmp
      SHODAN_API_KEY: ${SHODAN_API_KEY}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY}
      SECURITYTRAILS_API_KEY: ${SECURITYTRAILS_API_KEY}
      CENSYS_API_ID: ${CENSYS_API_ID}
      CENSYS_API_SECRET: ${CENSYS_API_SECRET}
      HIBP_API_KEY: ${HIBP_API_KEY}
      DEHASHED_EMAIL: ${DEHASHED_EMAIL}
      DEHASHED_API_KEY: ${DEHASHED_API_KEY}
    depends_on:
      - postgres
      - redis
      - backend
    command: celery -A osint_platform.celery_app:app worker -l info -Q transforms,maintenance,monitoring
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
