services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DJANGO_SETTINGS_MODULE: osint_platform.settings.development
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  tools_worker:
    build:
      context: .
      dockerfile: Dockerfile.tools-worker
    environment:
      DJANGO_SETTINGS_MODULE: osint_platform.settings.development
      REDIS_URL: redis://redis:6379
      OSINT_TOOLS_DIR: /tmp
    volumes:
      - .:/app
    depends_on:
      - redis
    command: sh -c "python manage.py migrate && celery -A osint_platform.celery_app:app worker -l info -Q transforms,maintenance,monitoring"
