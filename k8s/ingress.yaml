apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: osint-ingress
  namespace: osint-platform
  labels:
    app: osint-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  rules:
    - host: osint.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: osint-backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: osint-frontend
                port:
                  number: 80
