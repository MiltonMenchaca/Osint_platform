apiVersion: apps/v1
kind: Deployment
metadata:
  name: osint-frontend
  namespace: osint-platform
  labels:
    app: osint-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: osint-frontend
  template:
    metadata:
      labels:
        app: osint-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/OWNER/osint/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
